name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Verify committed dist is up to date
        run: |
          npm run build
          git diff --exit-code dist/ \
            || (echo "::error::dist/ is out of sync with src/. Run 'npm run build' and commit the result." && exit 1)
